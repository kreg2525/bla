<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Event</title>
   
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="css/host.css">
    <link rel="stylesheet" href="css/navbar.css">
</head>
<body>
     <nav>
          <a href="">
          <img src="images/logo.png" alt="Suni Logo">
          </a>
          <ul>
               <li><a href="#">+ Create Event</a></li>
               <li><a href="#" class="active">CvSU Events</a></li>
               <li><button class="nav-btn" onclick="window.location.href='sign-in.html'">Sign in</button></li>
          </ul>
     </nav>
    <section class="container">
        <div class="left-side">
            <div class="event-image">
                <img src="/images/stardew.png">
                <div class="expand-icon">
                    <i class="fa-solid fa-expand"></i>
                </div>
            </div>
            <div class="theme-card">
                <div class="theme-top">
                    <div class="theme-preview">
                        <div class="theme-text">
                            <h3>Theme</h3>
                            <p>Quantum</p>
                        </div>
                    </div>
                    <div class="theme-edit">
                        <i class="fa-solid fa-pen"></i>
                    </div>
                </div>
                <button class="theme-btn">
                    Customize Theme
                </button>
            </div>
        </div>
        <div class="right-side">
            <div class="top-row">
                <button class="privacy-btn">
                    Public <i class="fa-solid fa-angle-down"></i>
                </button>
            </div>
            <h1 class="event-title">
                Event Name
            </h1>
            <div class="date-section">
                <div class="date-box glass-box">
                    <div class="date-row">
                        <div class="date-left">
                            <i class="fa-regular fa-circle"></i>
                            <span>Start</span>
                        </div>
                        <div class="date-time">
                            <div class="date-pill">Tue, Mar 24</div>
                            <div class="date-pill">09:30 am</div>
                        </div>
                    </div>
                    <div class="date-row">
                        <div class="date-left">
                            <i class="fa-solid fa-circle"></i>
                            <span>End</span>
                        </div>
                        <div class="date-time">
                            <div class="date-pill">Tue, Mar 24</div>
                            <div class="date-pill">10:30 am</div>
                        </div>
                    </div>
                </div>
                <div class="timezone glass-box">
                    <i class="fa-solid fa-globe"></i>
                    <h4>GMT+08:00</h4>
                    <p>Manila</p>
                </div>
            </div>
            <div class="input-box glass-box">
                <i class="fa-solid fa-location-dot"></i>
                <div class="input-content">
                    <h3>Add Event Location</h3>
                    <p>Offline location or virtual link</p>
                </div>
            </div>
            <div class="input-box glass-box">
                <i class="fa-regular fa-file-lines"></i>
                <div class="input-content">
                    <h3>Add Description</h3>
                </div>
            </div>
            <h3 class="options-title">Event Options</h3>
            <div class="options-box glass-box">
                <div class="option-row">
                    <div class="option-left">
                        <i class="fa-solid fa-ticket"></i>
                        <span>Ticket Price</span>
                    </div>
                    <div>
                        Free <i class="fa-solid fa-pen"></i>
                    </div>
                </div>
                <div class="option-row">
                    <div class="option-left">
                        <i class="fa-solid fa-user-check"></i>
                        <span>Require Approval</span>
                    </div>
                    <div class="toggle"></div>
                </div>
                <div class="option-row">
                    <div class="option-left">
                        <i class="fa-solid fa-box"></i>
                        <span>Capacity</span>
                    </div>
                    <div>
                        Unlimited <i class="fa-solid fa-pen"></i>
                    </div>
                </div>
            </div>
            <button class="create-btn">
                Create Event
            </button>
        </div>
    </section>
    <div class="bottom-line"></div>
</body>
</html>
