<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Login Page</title>
     <link rel="stylesheet" href="/css/navbar.css">
     <link rel="stylesheet" href="/css/sign-in.css">
</head>
<body class="login-bg">
     <nav>
          <a href="">
          <img src="/images/logo.png" alt="Suni Logo">
          </a>
          <ul>
               <li><a href="/html/host-events.html">+ Create Event</a></li>
               <li><a href="#" class="active">CvSU Events</a></li>
               <li><button class="nav-btn" onclick="window.location.href='login.html'">Sign in</button></li>
          </ul>
     </nav>
     <div class="login-container">
          <div class="white-box">
               <div class="form-header">
                    <img src="/images/cvsulogo.png" alt="CvSU logo" class="cvsu-img">
                    <img src="/images/logo.png" alt="SUNI logo" class="logo-img">
                    <p>Please Sign In or Sign Up Below.</p>
               </div>
               <form class="login-form">
               <div class="input-email">
                    <label for="email">CvSU Email</label>
                    <input type="email" id="email" placeholder="xeed.magtira@cvsu.edu.ph" required>
               </div>
                    <button type="submit" class="btn-primary" onclick="window.location.href='index.html'">Continue with CvSU Email</button>
                    <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">Login as Guest</button>
               </form>
          </div>
     </div>
</body>
</html>
